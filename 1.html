<!-- 
    <strong></strong>은 굵은 글씨
    <u></u>는 밑줄
    <a></a>는 링크걸기
    href(=hypertext reference) 링크주소
    target="_blank" 새탭으로 열기
    title 툴팁 띄움(마우스 가져다놓으면 무엇에 관한 내용인지 알려줌)
-->
<a href="https://www.w3.org/TR/html52/" 
target="_blank" title="html speicification">

-->

-->
