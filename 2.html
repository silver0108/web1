<!-- 관용적 표현/이 문서는 html에 있다는 뜻 -->
<!DOCTYPE html>
<!-- <html></html>은 최고위층 태그-->
<html>
<!-- <head></head>는 본문을 설명함-->
<head>
<!-- <title></title> 웹페이지의 제목 -->
<title>WEB1 - CSS</title>

<!-- utf-8로 문서를 읽음 -->
<meta charset="utf-8">

    <!--
        [CSS] 태그 사용법/
        <style></style>은 디자인과 관련된 CSS에 관한 태그/
        우선순위: id 선택자 > class 선택자 > tag 선택자(같은 것에는 순서 영향이 있기 때문)
     -->
    <style>
        body {
            margin: 0;
        }
        /*
            모든 <a></a> 태그에 대해서 폰트 색을 검정색으로, 데코(밑줄)를 없앰/
            a와 같은 것을 선택자라고 부름/
            color:black;과 같은 것은 지정된 효과(=선언)/
            color와 같은 것은 속성, black과 같은 것은 속성 값이라고 부름
        */
        a {
            color:black;
            text-decoration: none;
        }
        /* #active는 id 선택자 */
        #active {
            color: red;
        }
        /* .saw는 클래스가 saw인 태그를 가리키는 선택자라는 의미 */
        .saw {
            color: gray;
        }

        h1 {
            font-size: 40px;
            text-align: center;
            border-bottom: 1px solid gray;
            margin: 0;
            padding: 20px;
        }

        ol {
            border-right: 1px solid gray;
            width: 100px;
            margin: 0;
            padding: 20px;
        }

        #grid {
            display: grid;
            grid-template-columns: 150px 1fr;
        }
        /* id 값이 grid인 것 중에서 ol 태그 */
        #grid ol{
             padding-left: 33px;
        }

        /* id 값이 grid인 것 중에서 id 값이 article인 것 */
        #grid #article {
            padding-left: 25px;
        }

        /* screen width < 800px */
        @media(max-width:800px){
            #grid {
            display: block;
            }

            ol {
            border-right:none;
            }

            h1{
                border-bottom: none;
            }
        }
        
    </style>
</head>

<!-- <body></body>는 분문의 내용-->
<body>
<!-- 가장 큰 제목 -->
<h1><a href="index.html">WEB</a></h1>

<!-- 
    [grid] div태그를 사용해서 ol태그와 
    div태그(h1태그와 p태그를 묶음)를 묶음 
-->
<div id="grid">
    <!--
        <ul></ul>은 부모태그 -> Unordered List/연관된 항목의 경계를 지음/그룹핑
        <ol></ol>은 부모태그 -> ordered List
        <li></li>는 자식태그 -> 목차 list
    
        2대(부모-자식)가 같이 다님
    -->
    <ol>
        <li><a href="1.html" class="saw">HTML</a></li>
        <!--[CSS] 속성 사용법/
            HTML의 style 속성을 이용하여 CSS로 하여금 
            색 설정, 데코(밑줄) 설정 
        <li><a href="2.html" style="color:red; text-decoration: underline;" class="saw">CSS</a></li>
        -->
    
        <!-- class는 그룹핑
            class의 속성 값은 여러개가 가능하며 띄어쓰기로 구분 
            id도 지정 가능-->
        <li><a href="2.html" class="saw" id= "active">CSS</a></li>
        <li><a href="3.html">JavaScript</a></li>
    </ol>
    
    <div id="article">
        <!-- <h1></h1> ~ <h6></h6>은 제목 -->
        <h2>CSS</h2>
    
        <p>CSS 페이지입니다:D</p>
